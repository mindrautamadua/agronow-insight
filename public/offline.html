<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Agronow L&amp;D</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #070b15; color: #f1f5f9; text-align: center; padding: 24px;
      background-image:
        radial-gradient(58% 48% at 12% 8%, rgba(16,185,129,0.20), transparent 60%),
        radial-gradient(52% 48% at 90% 26%, rgba(37,99,235,0.18), transparent 62%);
    }
    .card { max-width: 380px; }
    .logo { width: 64px; height: 64px; border-radius: 16px; overflow: hidden; margin: 0 auto 20px;
      box-shadow: 0 18px 50px -18px rgba(0,0,0,0.7); }
    .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 { font-size: 20px; font-weight: 700; margin: 0 0 8px; }
    p { font-size: 13px; color: #94a3b8; line-height: 1.6; margin: 0 0 22px; }
    button {
      appearance: none; border: 0; cursor: pointer; font-size: 14px; font-weight: 600; color: #fff;
      padding: 11px 22px; border-radius: 12px;
      background: linear-gradient(90deg, #059669, #2563eb);
      box-shadow: 0 10px 30px -10px rgba(5,150,105,0.6);
    }
    button:hover { filter: brightness(1.06); }
    .hint { margin-top: 18px; font-size: 11px; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/agronow-icon.png" alt="Agronow L&amp;D" /></div>
    <h1>Anda sedang offline</h1>
    <p>Koneksi internet terputus. Agronow L&amp;D memerlukan koneksi untuk memuat data terbaru. Periksa jaringan Anda lalu coba lagi.</p>
    <button onclick="location.reload()">Coba lagi</button>
    <p class="hint">Halaman ini ditampilkan oleh service worker saat offline.</p>
  </div>
</body>
</html>
